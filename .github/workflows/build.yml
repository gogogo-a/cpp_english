name: Build Windows EXE

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Compile
        shell: msys2 {0}
        run: |
          g++ -std=c++98 -Wall -Wextra -pedantic -Iinclude \
            -o guess_word.exe \
            src/main.cpp src/ConsoleUtil.cpp src/Draw.cpp src/GuessGame.cpp

      - name: Package EXE With Runtime DLLs
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp guess_word.exe dist/
          cp words.txt dist/
          cp /mingw64/bin/libgcc_s_seh-1.dll dist/
          cp /mingw64/bin/libstdc++-6.dll dist/
          cp /mingw64/bin/libwinpthread-1.dll dist/
          ls -la dist

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: dist/
